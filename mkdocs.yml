site_name: SuperMe SDK
site_description: Python SDK for the SuperMe AI API
site_url: https://sdkdocs.superme.ai/
repo_url: https://github.com/superme-ai/superme-sdk
repo_name: superme-ai/superme-sdk

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            docstring_options:
              # Treat each "Returns:" block as one item; otherwise griffe splits
              # a wrapped multi-line return description into one table row per line.
              returns_multiple_items: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            show_overloads: false
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - API Reference:
    - Authentication: api/auth.md
    - Client: api/client.md
    - Models: api/models.md
    - Streaming events: api/streaming.md
    - Sync:
      - Conversations: api/services/conversations.md
      - Profiles: api/services/profiles.md
      - Interviews: api/services/interviews.md
      - Library: api/services/library.md
      - Social: api/services/social.md
      - Provisioning: api/services/provision.md
    - Async (aio):
      - Conversations: api/services/aio/conversations.md
      - Profiles: api/services/aio/profiles.md
      - Interviews: api/services/aio/interviews.md
      - Agentic Resume: api/services/aio/agentic_resume.md
      - Provisioning: api/services/aio/provision.md
    - OpenAI-compatible chat: api/chat.md
