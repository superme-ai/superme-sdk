site_name: SuperMe SDK
site_description: Python SDK for the SuperMe AI API
site_url: https://superme-ai.github.io/superme-sdk/
repo_url: https://github.com/superme-ai/superme-sdk
repo_name: superme-ai/superme-sdk

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - API Reference:
    - Client: api/client.md
    - Models: api/models.md
    - Services:
      - Profiles: api/services/profiles.md
      - Conversations: api/services/conversations.md
      - Groups: api/services/groups.md
      - Companies: api/services/companies.md
      - Interviews: api/services/interviews.md
      - Content: api/services/content.md
      - Social: api/services/social.md
    - Auth: api/auth.md
    - Chat: api/chat.md
